name: Auto Update Index JSONon:push:paths:- 'plugins/**/*.ipk'- 'plugins/**/*.tar.gz'jobs:update-json:runs-on: ubuntu-lateststeps:- name: Checkout Repositoryuses: actions/checkout@v4- name: Set up Pythonuses: actions/setup-python@v5with:python-version: '3.x'- name: Run Auto Index Scriptrun: |import osimport jsonGITHUB_BASE_URL = "https://githubusercontent.com"data = []folder = "plugins"if os.path.exists(folder):for file in os.listdir(folder):if file.endswith(".ipk") or file.endswith(".tar.gz"):name_clean = file.replace(".ipk", "").replace(".tar.gz", "")parts = name_clean.split("_")name = parts[0]version = parts[1] if len(parts) > 1 else "1.0"plugin_entry = {"section": "Plugins","name": name,"version": version,"description": f"M Store - {name}","url": f"{GITHUB_BASE_URL}{folder}/{file}"}data.append(plugin_entry)with open("index.json", "w", encoding="utf-8") as f:json.dump(data, f, indent=4, ensure_ascii=False)shell: python- name: Commit and Push Changesrun: |git config --global user.name "github-actions[bot]"git config --global user.email "github-actions[bot]@://github.com"git add index.jsongit commit -m "Auto-update index.json [skip ci]" || echo "No changes to commit"git push
